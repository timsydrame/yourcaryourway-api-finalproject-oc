spring.application.name=yourcaryourway-api

spring.datasource.url=jdbc:postgresql://postgres:5432/ycyw_db
spring.datasource.username=ycyw_user
spring.datasource.password=ycyw_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=yourcaryourway-super-secret-key-2026-very-long-secure
jwt.expiration=86400000

server.port=8080

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.override-with-generic-response=false
springdoc.swagger-ui.persist-authorization=true

